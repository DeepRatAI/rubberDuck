name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true
  APP_URL: http://localhost:3000
  NEXTAUTH_URL: http://localhost:3000
  AUTH_SECRET: local-ci-secret-with-at-least-thirty-two-characters
  NEXTAUTH_SECRET: local-ci-secret-with-at-least-thirty-two-characters
  DATABASE_URL: postgres://devit:devit@localhost:5432/devit
  CRON_SECRET: local-cron-secret-with-at-least-thirty-two-characters
  RSS_REFRESH_SECRET: local-rss-refresh-secret
  STORAGE_DRIVER: local
  RUBBERDUCK_E2E_MODE: "true"

jobs:
  quality:
    name: Lint, Types, Tests, Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devit
          POSTGRES_PASSWORD: devit
          POSTGRES_DB: devit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devit -d devit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Pyodide assets
        run: pnpm pyodide:sync

      - name: Lint
        run: pnpm lint

      - name: i18n coverage
        run: pnpm i18n:check

      - name: Secret scan
        run: pnpm security:secrets

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Dependency audit
        run: pnpm security:audit

      - name: Migration smoke
        run: pnpm db:migrate

      - name: Seed smoke
        run: pnpm db:seed

      - name: Build
        run: pnpm build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devit
          POSTGRES_PASSWORD: devit
          POSTGRES_DB: devit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devit -d devit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Migrate and seed
        run: |
          pnpm db:migrate
          pnpm db:seed

      - name: Run E2E
        run: pnpm test:e2e --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
