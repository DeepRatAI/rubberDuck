services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: devit
      POSTGRES_PASSWORD: devit
      POSTGRES_DB: devit
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devit -d devit"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - devit_postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - devit_redis:/data

volumes:
  devit_postgres:
  devit_redis:
